<style>
.sec-wrap{
  max-width:900px; margin:2rem auto;
  padding:2.5rem; border-radius:20px;
  box-shadow:0 10px 35px rgba(0,0,0,0.12);
  border-top:8px solid #0066cc;
  background-attachment: fixed;
}
.sec-wrap h1{
  color:#1e293b; font-size:1.8rem;
  font-weight:700; margin-top:0;
}
.post-box{
  background:#ffffff; padding:1.5rem; border-radius:16px;
  margin-bottom:1.2rem; border:1px solid #e0eeff;
  box-shadow:0 3px 12px rgba(0,0,0,0.05);
}
.post-box input, .post-box textarea{
  width:100%; padding:14px; margin-bottom:12px;
  border:1px solid #c6e2ff; border-radius:10px;
  background:#fafdff; font-size:15px;
}
.post-btn{
  background:#0066cc; color:white; border:none;
  padding:12px 20px; border-radius:10px;
  font-weight:bold; cursor:pointer;
  transition:0.2s;
}
.post-btn:hover{opacity:0.9}
.article{
  background:white; padding:1.6rem; border-radius:16px;
  margin-bottom:1.2rem; border-left:6px solid #0066cc;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}
.article h3{margin-top:0; color:#1e293b; font-size:1.3rem}
.publisher{font-size:12px;color:#666;margin-top:5px;display:none;}
.auto-reply {
  background:#d1e7ff;
  padding:12px 16px;
  border-radius:10px;
  font-size:15px;
  color:#003366;
  margin:10px 0;
  border-left:4px solid #0066cc;
}
.comment{
  margin-top:14px; padding-top:14px; border-top:1px solid #eee;
}
.comment input{
  width:100%; padding:10px; margin-top:10px;
  border-radius:8px; border:1px solid #ddd;
}
.comment-item{
  background:#f1f5f9; padding:10px 14px;
  border-radius:8px; margin-top:8px; font-size:14px;
}
.back{
  margin-top:1rem; display:inline-block;
  color:#0066cc; font-weight:bold; text-decoration:none;
  font-size:16px;
}
.guest-info{
  background:#fff9e6; padding:12px; border-radius:10px; margin-bottom:10px; font-size:14px;
}
.admin-panel{
  background:#ffebee; padding:12px; border-radius:10px; margin-bottom:10px; font-size:14px;
}

.sec-wrap.clinical {
  background: linear-gradient(135deg, #f0f9ff 0%, #d1e7ff 100%);
  border-top-color: #007bff;
}
.sec-wrap.teach {
  background: linear-gradient(135deg, #f0fff4 0%, #c7f5d4 100%);
  border-top-color: #28a745;
}
.sec-wrap.research {
  background: linear-gradient(135deg, #f8f0ff 0%, #e2d1ff 100%);
  border-top-color: #9955ff;
}
.sec-wrap.academic {
  background: linear-gradient(135deg, #fff0f6 0%, #ffd1eb 100%);
  border-top-color: #ff69b4;
}
.sec-wrap.chat {
  background: linear-gradient(135deg, #fffbf0 0%, #ffecb2 100%);
  border-top-color: #ffb100;
}

.clinical .article{border-left-color:#007bff}
.teach .article{border-left-color:#28a745}
.research .article{border-left-color:#9955ff}
.academic .article{border-left-color:#ff69b4}
.chat .article{border-left-color:#ffb100}

.clinical .post-btn{background:#007bff}
.teach .post-btn{background:#28a745}
.research .post-btn{background:#9955ff}
.academic .post-btn{background:#ff69b4}
.chat .post-btn{background:#ffb100}
</style>

<div class="sec-wrap {{ include.id }}">
  <h1>{{ include.title }}</h1>
  <div id="guestNotice"></div>
  <div id="adminArea"></div>

  <div class="post-box" id="postArea">
    <input placeholder="输入邀请码" id="inviteCode">
    <input placeholder="你的昵称（仅管理员可见）" id="authorName">
    <input placeholder="文章标题" id="title-{{ include.id }}">
    <textarea rows="3" placeholder="内容" id="content-{{ include.id }}"></textarea>
    <button class="post-btn" onclick="submitPost()">提交审核</button>
  </div>

  <div id="list-{{ include.id }}"></div>
  <a href="/blog/" class="back">← 返回博客中心</a>
</div>

<script>
const sec = '{{ include.id }}';
const INVITE_CODE = "ADMIN2025";
const ADMIN_PASS = "ADMIN888";
const MAX_GUEST_PER_DAY = 5;

const autoReplies = [
  "你的见解非常专业，令人受益匪浅！",
  "内容详实有深度，非常值得学习和借鉴",
  "观点独特清晰，一看就是经验丰富的专家",
  "文笔流畅思路严谨，分享十分有价值",
  "这篇内容质量超高，感谢用心分享干货",
  "思路清晰逻辑到位，读完收获特别大",
  "Your professional insights are truly impressive and highly valuable for all readers.",
  "This is an excellent share with deep thoughts, clear logic and great practical meaning.",
  "You have an amazing perspective and your writing is super helpful for everyone.",
  "Wonderful article! It’s well-organized, educational and full of precious experience.",
  "High-quality content with strong expertise, thank you for your excellent sharing."
];

function getRandomPraise() {
  return autoReplies[Math.floor(Math.random() * autoReplies.length)];
}

function isAdmin() {
  return prompt("Admin Password:") === ADMIN_PASS;
}
function canComment() {
  let today = new Date().toISOString().split('T')[0];
  if (localStorage.getItem("comment_used_"+today)) return true;
  let c = parseInt(localStorage.getItem("guest_comment_"+today)||0);
  if (c >= MAX_GUEST_PER_DAY) return false;
  localStorage.setItem("guest_comment_"+today, c+1);
  localStorage.setItem("comment_used_"+today, "true");
  return true;
}

function submitPost() {
  let code = document.getElementById("inviteCode").value;
  if (code !== INVITE_CODE) {
    alert("邀请码错误");
    return;
  }
  let t = document.getElementById("title-"+sec).value.trim();
  let c = document.getElementById("content-"+sec).value.trim();
  let a = document.getElementById("authorName").value.trim() || "Guest";
  if (!t || !c) {
    alert("请填写标题和内容");
    return;
  }

  let pending = JSON.parse(localStorage.getItem("pending_"+sec))||[];
  pending.push({
    title:t, content:c, author:a,
    time: new Date().toLocaleString(),
    autoReply: getRandomPraise()
  });
  localStorage.setItem("pending_"+sec, JSON.stringify(pending));
  alert("提交成功，等待审核 ✅");
  document.getElementById("title-"+sec).value="";
  document.getElementById("content-"+sec).value="";
}

function loadPosts() {
  let container = document.getElementById("list-"+sec);
  let posts = JSON.parse(localStorage.getItem("published_"+sec))||[];
  container.innerHTML = "";
  posts.forEach((p, i) => {
    let div = document.createElement("div");
    div.className = "article";
    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.content}</p>
      <div class="auto-reply">💬 ${p.autoReply || "Great post!"}</div>
      <div class="publisher" id="a_${i}">By: ${p.author}</div>
      <div class="comment">
        <input placeholder="写评论…" onkeydown="if(event.key==='Enter')cmt(${i},this.value)">
        <div id="cmt_${i}"></div>
      </div>`;
    container.appendChild(div);
    loadCmt(i);
  });
}

function cmt(pid, txt) {
  if (!canComment()) {
    alert("今日评论名额已满！");
    return;
  }
  if (!txt) return;
  let posts = JSON.parse(localStorage.getItem("published_"+sec))||[];
  posts[pid].comments.push(txt.trim());
  localStorage.setItem("published_"+sec, JSON.stringify(posts));
  event.target.value = "";
  loadCmt(pid);
}
function loadCmt(pid) {
  let posts = JSON.parse(localStorage.getItem("published_"+sec))||[];
  let box = document.getElementById("cmt_"+pid);
  box.innerHTML = "";
  posts[pid].comments.forEach(c => {
    let item = document.createElement("div");
    item.className = "comment-item";
    item.innerText = c;
    box.appendChild(item);
  });
}

function showAdmin() {
  if (!isAdmin()) return;
  let pending = JSON.parse(localStorage.getItem("pending_"+sec))||[];
  let html = `<div class='admin-panel'><strong>🔴 待审核文章 (${pending.length})</strong><br>`;
  pending.forEach((p,i)=>{
    html+=`<div style='background:#fff; padding:6px; margin:6px 0; border-radius:6px'>
      <b>${p.title}</b><br>${p.content}<br>
      <small>作者: ${p.author} | ${p.time}</small><br>
      <button onclick='ok(${i})' style='color:green'>通过</button>
      <button onclick='no(${i})' style='color:red'>拒绝</button>
    </div>`;
  });
  document.getElementById("adminArea").innerHTML = html+"</div>";
}

function ok(idx) {
  let p = JSON.parse(localStorage.getItem("pending_"+sec))||[];
  let pub = JSON.parse(localStorage.getItem("published_"+sec))||[];
  let item = p[idx];
  item.comments = [];
  pub.unshift(item);
  p.splice(idx,1);
  localStorage.setItem("pending_"+sec, JSON.stringify(p));
  localStorage.setItem("published_"+sec, JSON.stringify(pub));
  showAdmin();
  loadPosts();
}
function no(idx) {
  let p = JSON.parse(localStorage.getItem("pending_"+sec))||[];
  p.splice(idx,1);
  localStorage.setItem("pending_"+sec, JSON.stringify(p));
  showAdmin();
}

window.onload = () => {
  loadPosts();
  if (confirm("显示管理员面板？")) showAdmin();
};
</script>
