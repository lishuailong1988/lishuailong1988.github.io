<style>
  /* 整体美化 + 科技医疗背景 */
  .sec-wrap{
    max-width:900px;
    margin:2rem auto;
    background: #ffffff;
    padding:2rem;
    border-radius:18px;
    box-shadow: 0 8px 30px rgba(0,70,150,0.15);
    border-top: 6px solid #007bff;
    background-image: linear-gradient(135deg, #f9fbfd 0%, #f1f7ff 100%);
  }
  /* 标题样式 */
  .sec-wrap h1{
    color: #1e293b;
    margin-top:0;
    font-size: 1.6rem;
  }
  /* 发帖盒子 */
  .post-box{
    background:#ffffff;
    padding:1.2rem;
    border-radius:12px;
    margin-bottom:1rem;
    border: 1px solid #e6f0ff;
  }
  .post-box input,
  .post-box textarea{
    width:100%;
    padding:12px;
    margin-bottom:10px;
    border: 1px solid #dcebff;
    border-radius:8px;
    font-size:15px;
    background: #fafcff;
  }
  .post-btn{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
    transition: 0.2s;
  }
  .post-btn:hover{
    background: #005cbf;
  }
  /* 文章卡片 */
  .article{
    background:white;
    padding:1.4rem;
    border-radius:12px;
    margin-bottom:1rem;
    border-left:5px solid #007bff;
    box-shadow:0 2px 8px rgba(0,60,130,0.08);
  }
  .article h3{
    margin-top:0;
    color: #1e293b;
  }
  /* 评论区 */
  .comment{
    margin-top:12px;
    padding-top:12px;
    border-top:1px solid #eee;
  }
  .comment input{
    width:100%;
    padding:8px;
    margin-top:8px;
    border-radius:6px;
    border:1px solid #eee;
  }
  .comment-item{
    background:#f1f5f9;
    padding:8px 12px;
    border-radius:6px;
    margin-top:6px;
    font-size:14px;
  }
  /* 返回按钮 */
  .back{
    margin-top:1rem;
    display:inline-block;
    color:#007bff;
    text-decoration:none;
    font-weight:bold;
  }
</style>

<div class="sec-wrap">
  <h1>{{ include.title }}</h1>
  <div class="post-box">
    <input placeholder="文章标题" id="title-{{ include.id }}">
    <textarea rows="3" placeholder="写点内容…" id="content-{{ include.id }}"></textarea>
    <button class="post-btn" onclick="publish('{{ include.id }}')">发布文章</button>
  </div>
  <div id="list-{{ include.id }}"></div>
  <a href="/blog/" class="back">← 返回博客中心</a>
</div>

<script>
const sec = '{{ include.id }}';
function publish(sec) {
  let t = document.getElementById('title-'+sec).value.trim();
  let c = document.getElementById('content-'+sec).value.trim();
  if (!t || !c) return;
  let posts = JSON.parse(localStorage.getItem('posts_'+sec)) || [];
  posts.unshift({ id: Date.now(), title: t, content: c, comments: [] });
  localStorage.setItem('posts_'+sec, JSON.stringify(posts));
  document.getElementById('title-'+sec).value = '';
  document.getElementById('content-'+sec).value = '';
  load(sec);
}
function load(sec) {
  let container = document.getElementById('list-'+sec);
  let posts = JSON.parse(localStorage.getItem('posts_'+sec)) || [];
  container.innerHTML = '';
  posts.forEach((p, i) => {
    let div = document.createElement('div');
    div.className = 'article';
    div.innerHTML = `<h3>${p.title}</h3><p>${p.content}</p><div class="comment"><input placeholder="写评论…" onkeydown="if(event.key=='Enter')addComment('${sec}',${i},this.value)"><div id="cmt_${sec}_${i}"></div></div>`;
    container.appendChild(div);
    loadCmt(sec, i);
  });
}
function addComment(sec, idx, text) {
  if (!text.trim()) return;
  let posts = JSON.parse(localStorage.getItem('posts_'+sec)) || [];
  posts[idx].comments.push(text.trim());
  localStorage.setItem('posts_'+sec, JSON.stringify(posts));
  loadCmt(sec, idx);
  event.target.value = '';
}
function loadCmt(sec, idx) {
  let posts = JSON.parse(localStorage.getItem('posts_'+sec)) || [];
  let box = document.getElementById(`cmt_${sec}_${idx}`);
  box.innerHTML = '';
  posts[idx].comments.forEach(c => {
    let item = document.createElement('div');
    item.className = 'comment-item';
    item.innerText = c;
    box.appendChild(item);
  });
}
window.onload = () => load(sec);
</script>
