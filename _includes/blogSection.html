/*
const INVITE_CODE = "这里改邀请码";
const ADMIN_PASS = "这里改管理员密码";

const GUEST_MAX_USER = 5;   // 12小时最多几人
const GUEST_MAX_POST = 5;   // 每人最多几篇
const GUEST_HOUR = 12;      // 几小时重置 
*/
<style>
.sec-wrap{
  max-width:900px; margin:2rem auto;
  padding:2.5rem; border-radius:20px;
  box-shadow:0 10px 35px rgba(0,0,0,0.12);
  border-top:8px solid #0066cc;
  background-attachment: fixed;
}
.sec-wrap h1{
  color:#1e293b; font-size:1.8rem;
  font-weight:700; margin-top:0;
}
.post-box{
  background:#ffffff; padding:1.5rem; border-radius:16px;
  margin-bottom:1.2rem; border:1px solid #e0eeff;
  box-shadow:0 3px 12px rgba(0,0,0,0.05);
  display: block !important;
}
.post-box input, .post-box textarea{
  width:100%; padding:14px; margin-bottom:12px;
  border:1px solid #c6e2ff; border-radius:10px;
  background:#fafdff; font-size:15px;
}
.post-btn{
  background:#0066cc; color:white; border:none;
  padding:12px 20px; border-radius:10px;
  font-weight:bold; cursor:pointer;
  transition:0.2s;
}
.post-btn:hover{opacity:0.9}
.article{
  background:white; padding:1.6rem; border-radius:16px;
  margin-bottom:1.2rem; border-left:6px solid #0066cc;
  box-shadow:0 5px 15px rgba(0,0,0,0.06);
}
.article h3{margin-top:0; color:#1e293b; font-size:1.3rem}
.publisher{font-size:12px;color:#666;margin-top:5px;display:none;}
.auto-reply {
  background:#d1e7ff;
  padding:12px 16px;
  border-radius:10px;
  font-size:15px;
  color:#003366;
  margin:10px 0;
  border-left:4px solid #0066cc;
}
.comment{
  margin-top:14px; padding-top:14px; border-top:1px solid #eee;
}
.comment input{
  width:100%; padding:10px; margin-top:10px;
  border-radius:8px; border:1px solid #ddd;
}
.comment-item{
  background:#f1f5f9; padding:10px 14px;
  border-radius:8px; margin-top:8px; font-size:14px;
}
.back{
  margin-top:1rem; display:inline-block;
  color:#0066cc; font-weight:bold; text-decoration:none;
  font-size:16px;
}
.guest-info{
  background:#fff9e6; padding:12px; border-radius:10px; margin-bottom:10px; font-size:14px;
}
.admin-panel{
  background:#ffebee; padding:12px; border-radius:10px; margin-bottom:10px; font-size:14px;
}

.sec-wrap.clinical {
  background: linear-gradient(135deg, #f0f9ff 0%, #d1e7ff 100%);
  border-top-color: #007bff;
}
.sec-wrap.teach {
  background: linear-gradient(135deg, #f0fff4 0%, #c7f5d4 100%);
  border-top-color: #28a745;
}
.sec-wrap.research {
  background: linear-gradient(135deg, #f8f0ff 0%, #e2d1ff 100%);
  border-top-color: #9955ff;
}
.sec-wrap.academic {
  background: linear-gradient(135deg, #fff0f6 0%, #ffd1eb 100%);
  border-top-color: #ff69b4;
}
.sec-wrap.chat {
  background: linear-gradient(135deg, #fffbf0 0%, #ffecb2 100%);
  border-top-color: #ffb100;
}

.clinical .article{border-left-color:#007bff}
.teach .article{border-left-color:#28a745}
.research .article{border-left-color:#9955ff}
.academic .article{border-left-color:#ff69b4}
.chat .article{border-left-color:#ffb100}

.clinical .post-btn{background:#007bff}
.teach .post-btn{background:#28a745}
.research .post-btn{background:#9955ff}
.academic .post-btn{background:#ff69b4}
.chat .post-btn{background:#ffb100}
</style>

<div class="sec-wrap {{ include.id }}">
  <h1>{{ include.title }}</h1>
  <div id="guestNotice"></div>
  <div id="adminArea"></div>

  <div class="post-box" id="postArea">
    <input placeholder="邀请码（管理员免填）" id="inviteCode">
    <input placeholder="你的昵称（仅管理员可见）" id="authorName">
    <input placeholder="文章标题" id="title-{{ include.id }}">
    <textarea rows="3" placeholder="内容" id="content-{{ include.id }}"></textarea>
    <button class="post-btn" onclick="publishPost()">发布文章</button>
  </div>

  <div id="list-{{ include.id }}"></div>
  <a href="/blog/" class="back">← 返回博客中心</a>
</div>

<script>
const sec = '{{ include.id }}';
const INVITE_CODE = "微我50";
const ADMIN_PASS = "258046";

// 游客限制：12小时内最多5人，每人最多5篇
const GUEST_MAX_USER = 5;
const GUEST_MAX_POST = 5;
const GUEST_HOUR = 12;

const autoReplies = [
  "你的见解非常专业，令人受益匪浅！",
  "内容详实有深度，非常值得学习和借鉴",
  "观点独特清晰，一看就是经验丰富的专家",
  "文笔流畅思路严谨，分享十分有价值",
  "这篇内容质量超高，感谢用心分享干货",
  "思路清晰逻辑到位，读完收获特别大",
  "Your professional insights are truly impressive and highly valuable for all readers.",
  "This is an excellent share with deep thoughts, clear logic and great practical meaning.",
  "You have an amazing perspective and your writing is super helpful for everyone.",
  "Wonderful article! It’s well-organized, educational and full of precious experience.",
  "High-quality content with strong expertise, thank you for your excellent sharing."
];

let isAdminMode = false;

function getRandomPraise() {
  return autoReplies[Math.floor(Math.random() * autoReplies.length)];
}

// ================== 权限判断 ==================
function checkAdmin() {
  if (isAdminMode) return true;
  if (prompt("管理员密码：") === ADMIN_PASS) {
    isAdminMode = true;
    return true;
  }
  return false;
}

function checkInvite(code) {
  return code.trim() === INVITE_CODE;
}

// 游客限制：12小时内最多5人，每人5篇
function checkGuestLimit() {
  const now = Date.now();
  const keyExpire = "guest_expire_" + sec;
  const keyCount = "guest_user_count_" + sec;
  const keyMyPost = "guest_my_post_" + sec;

  let expire = localStorage.getItem(keyExpire);
  if (!expire || now > expire) {
    localStorage.setItem(keyExpire, now + GUEST_HOUR * 60 * 60 * 1000);
    localStorage.setItem(keyCount, 0);
    localStorage.setItem(keyMyPost, 0);
  }

  let userCount = parseInt(localStorage.getItem(keyCount) || 0);
  let myPost = parseInt(localStorage.getItem(keyMyPost) || 0);

  if (userCount >= GUEST_MAX_USER) {
    alert("今日体验名额已满");
    return false;
  }
  if (myPost >= GUEST_MAX_POST) {
    alert("你今日已达最大发帖数");
    return false;
  }

  if (myPost === 0) {
    localStorage.setItem(keyCount, userCount + 1);
  }
  localStorage.setItem(keyMyPost, myPost + 1);
  return true;
}

// ================== 发布文章 ==================
function publishPost() {
  const code = document.getElementById("inviteCode").value.trim();
  const title = document.getElementById("title-" + sec).value.trim();
  const content = document.getElementById("content-" + sec).value.trim();
  const author = document.getElementById("authorName").value.trim() || "游客";

  if (!title || !content) {
    alert("请填写标题和内容");
    return;
  }

  // 1. 管理员
  if (checkAdmin()) {
    submitToPending(title, content, author);
    return;
  }

  // 2. 邀请码用户
  if (checkInvite(code)) {
    submitToPending(title, content, author);
    return;
  }

  // 3. 普通游客
  if (checkGuestLimit()) {
    submitToPending(title, content, author);
  }
}

function submitToPending(title, content, author) {
  let pending = JSON.parse(localStorage.getItem("pending_" + sec) || "[]");
  pending.push({
    title, content, author,
    time: new Date().toLocaleString(),
    autoReply: getRandomPraise()
  });
  localStorage.setItem("pending_" + sec, JSON.stringify(pending));
  alert("提交成功，等待管理员审核 ✅");

  document.getElementById("title-" + sec).value = "";
  document.getElementById("content-" + sec).value = "";
}

// ================== 加载文章 ==================
function loadPosts() {
  const container = document.getElementById("list-" + sec);
  const posts = JSON.parse(localStorage.getItem("published_" + sec) || "[]");
  container.innerHTML = "";
  posts.forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "article";
    div.innerHTML = `
      <h3>${p.title}</h3>
      <p>${p.content}</p>
      <div class="auto-reply">💬 ${p.autoReply}</div>
      <div class="publisher">作者：${p.author}</div>
      <div class="comment">
        <input placeholder="写评论…" onkeydown="if(event.key==='Enter')addComment(${i}, this.value)">
        <div id="cmt_${i}"></div>
      </div>`;
    container.appendChild(div);
    loadComments(i);
  });
}

function addComment(pid, text) {
  if (!text.trim()) return;
  let posts = JSON.parse(localStorage.getItem("published_" + sec) || "[]");
  posts[pid].comments.push(text.trim());
  localStorage.setItem("published_" + sec, JSON.stringify(posts));
  event.target.value = "";
  loadComments(pid);
}

function loadComments(pid) {
  let posts = JSON.parse(localStorage.getItem("published_" + sec) || "[]");
  const box = document.getElementById("cmt_" + pid);
  box.innerHTML = "";
  posts[pid].comments.forEach(c => {
    const item = document.createElement("div");
    item.className = "comment-item";
    item.innerText = c;
    box.appendChild(item);
  });
}

// ================== 审核面板 ==================
function showAdminPanel() {
  if (!checkAdmin()) return;
  const pending = JSON.parse(localStorage.getItem("pending_" + sec) || "[]");
  let html = `<div class="admin-panel"><strong>🔴 待审核文章（${pending.length}）</strong><br>`;
  pending.forEach((p, i) => {
    html += `
    <div style="background:#fff; padding:8px; margin:6px 0; border-radius:8px">
      <b>${p.title}</b><br>${p.content}<br>
      <small>作者：${p.author}｜${p.time}</small><br>
      <button onclick="approve(${i})" style="color:green">通过</button>
      <button onclick="reject(${i})" style="color:red">拒绝</button>
    </div>`;
  });
  document.getElementById("adminArea").innerHTML = html + "</div>";
}

function approve(idx) {
  let pending = JSON.parse(localStorage.getItem("pending_" + sec) || "[]");
  let published = JSON.parse(localStorage.getItem("published_" + sec) || "[]");
  const item = pending[idx];
  item.comments = [];
  published.unshift(item);
  pending.splice(idx, 1);
  localStorage.setItem("pending_" + sec, JSON.stringify(pending));
  localStorage.setItem("published_" + sec, JSON.stringify(published));
  showAdminPanel();
  loadPosts();
}

function reject(idx) {
  let pending = JSON.parse(localStorage.getItem("pending_" + sec) || "[]");
  pending.splice(idx, 1);
  localStorage.setItem("pending_" + sec, JSON.stringify(pending));
  showAdminPanel();
}

// ================== 初始化 ==================
window.onload = () => {
  loadPosts();
  if (confirm("显示管理员面板？")) showAdminPanel();
};
</script>
